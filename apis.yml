  - type: Features
    data:
      - name: API Test Assertions
        description: >-
          Define assertions on API response status codes, headers, response
          body content, JSON Schema compliance, and response time to validate
          API behavior.
      - name: Scheduled Monitoring
        description: >-
          Run API tests on a scheduled basis (hourly, daily, etc.) to
          continuously monitor production APIs for availability and correctness.
      - name: Deployment Testing
        description: >-
          Trigger Assertible test suites automatically after deployments via
          webhooks, ensuring API quality gates are enforced in CI/CD pipelines.
      - name: JSON Schema Validation
        description: >-
          Validate API responses against JSON Schema definitions to ensure
          response payloads match expected data structures.
      - name: Team Collaboration
        description: >-
          Share test suites and API monitoring configurations across teams
          with role-based access and shared notification channels.
  - type: UseCases
    data:
      - name: Post-Deployment Validation
        description: >-
          Development teams trigger Assertible test suites after each deployment
          to verify APIs are functioning correctly before traffic shifts.
      - name: API Uptime Monitoring
        description: >-
          Operations teams use scheduled Assertible tests to monitor API
          availability and receive alerts when endpoints fail.
      - name: API Contract Testing
        description: >-
          QA teams use JSON Schema assertions to validate that API responses
          match documented contracts and catch breaking changes.
  - type: Integrations
    data:
      - name: GitHub
        description: >-
          Integration with GitHub for triggering tests on pull requests and
          deployment events through GitHub Actions and webhooks.
      - name: Slack
        description: >-
          Slack notifications for test failures, alerts, and monitoring events
          from Assertible test runs.
      - name: PagerDuty
        description: >-
          PagerDuty integration for escalating API monitoring failures to
          on-call teams for incident response.
      - name: CircleCI
        description: >-
          Integration with CircleCI pipelines for running Assertible test
          suites as part of continuous integration workflows.
